name: Build Signed APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: dummyPassword123
      KEY_ALIAS: dummyalias
      KEY_PASSWORD: dummyPassword123
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Generate Dummy Debug-style Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Personal Dev, OU=Personal, O=Personal, L=Unknown, S=Unknown, C=ID"
          echo "✅ Dummy keystore generated successfully."

      - name: Validate Generated Keystore
        run: |
          if [ ! -s release.keystore ]; then
            echo "::error::File keystore failed to generate."
            exit 1
          fi

          keytool -list -v \
            -keystore release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" > keystore_check.log 2>&1

          if [ $? -ne 0 ]; then
            echo "::error::Keystore failed to initialize. Check log."
            cat keystore_check.log
            exit 1
          fi

          echo "✅ Keystore is valid."

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK is Actually Signed
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found after build."
            exit 1
          fi
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK_PATH"
          if [ $? -ne 0 ]; then
            echo "::error::APK failed signature verification (apksigner)."
            exit 1
          fi
          echo "✅ APK signature verified successfully."

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-run${{ github.run_number }}-signed
          path: app/build/outputs/apk/release/*.apk
